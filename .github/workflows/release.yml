# Builds the desktop installers on real Windows and macOS machines and
# publishes them to the repo's GitHub Releases page, so users just download.
#
# To ship a release:
#   1. (optional) bump "version" in desktop/package.json
#   2. git tag v0.1.0 && git push origin v0.1.0   (tag = v + that version)
# ~10 minutes later the installers appear at .../releases/latest.

name: Release desktop app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # electron-builder uploads the installers to the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend + desktop server bundle
        run: npm run desktop:build

      - name: Install desktop dependencies
        run: npm install
        working-directory: desktop

      - name: Build installer and publish to GitHub Releases
        run: npx electron-builder --publish always
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
